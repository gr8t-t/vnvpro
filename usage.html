<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usage — VNV Pro</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%237c3aed'/><text x='16' y='23' font-size='18' text-anchor='middle' fill='%23fff' font-family='Arial' font-weight='bold'>V</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .usage-main { max-width: 1000px; margin: 0 auto; padding: 28px 20px 60px; }
    .usage-hello { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .usage-sub { color: var(--text2); font-size: 14px; margin-bottom: 22px; }
    .usage-controls { display:flex; align-items:center; gap:12px; margin:0 0 18px; flex-wrap:wrap; }
    .seg { display:inline-flex; background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:3px; }
    .seg-btn { border:none; background:transparent; color:var(--text2); padding:6px 14px; border-radius:8px; cursor:pointer; font-size:13px; }
    .seg-btn.active { background:var(--accent); color:#fff; }
    .usage-summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:18px; }
    .usage-tile { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px; }
    .usage-tile .lab { font-size:12px; color:var(--text2); margin-bottom:6px; }
    .usage-tile .val { font-size:22px; font-weight:800; }
    .usage-tile .sub { font-size:11px; color:var(--text2); margin-top:4px; }
    .usage-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:16px; }
    .usage-card-title { font-size:14px; font-weight:700; margin-bottom:14px; }
    .usage-2col { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media (max-width:820px){ .usage-2col{ grid-template-columns:1fr; } }
    .bar-chart { display:flex; align-items:flex-end; gap:6px; height:200px; overflow-x:auto; padding-top:8px; }
    .bar-chart.hours { gap:3px; }
    .bar-col { flex:1 0 auto; min-width:14px; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; }
    .bar-stack { width:72%; max-width:32px; min-height:2px; border-radius:4px 4px 0 0; display:flex; flex-direction:column-reverse; overflow:hidden; }
    .bar-seg { width:100%; }
    .bar-lab { font-size:10px; color:var(--text2); margin-top:6px; white-space:nowrap; }
    .hbar-list { display:flex; flex-direction:column; gap:12px; }
    .hbar-row { display:grid; grid-template-columns:128px 1fr 62px; align-items:center; gap:10px; font-size:12px; }
    .hbar-track { background:var(--bg3); border-radius:6px; height:12px; overflow:hidden; }
    .hbar-fill { height:100%; border-radius:6px; min-width:2px; }
    .hbar-val { text-align:right; color:var(--text2); }
    .usage-legend { display:flex; flex-wrap:wrap; gap:12px; margin-top:12px; font-size:11px; color:var(--text2); }
    .usage-legend span { display:inline-flex; align-items:center; gap:5px; }
    .usage-legend i { width:10px; height:10px; border-radius:3px; display:inline-block; }
    .usage-empty { color:var(--text2); font-size:13px; text-align:center; padding:34px; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <a href="home.html" class="app-logo"><div class="logo-icon">✦</div> VNV Pro</a>
      <div class="coin-chip" onclick="location.href='app.html'">🪙 <span id="coinBalance">—</span> coins</div>
    </div>
    <div class="header-right">
      <a href="home.html" class="btn btn-ghost btn-sm">← Home</a>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="usage-main">
    <div class="usage-hello">Your usage</div>
    <div class="usage-sub">See how your coins are spent, on what, and when.</div>

    <div class="usage-controls">
      <div class="seg" id="usageGran">
        <button class="seg-btn active" onclick="setUsageGran('daily', this)">Daily</button>
        <button class="seg-btn" onclick="setUsageGran('weekly', this)">Weekly</button>
        <button class="seg-btn" onclick="setUsageGran('monthly', this)">Monthly</button>
      </div>
    </div>

    <div class="usage-summary" id="usageSummary"></div>

    <div class="usage-card">
      <div class="usage-card-title" id="usageMainTitle">Coins used per day</div>
      <div class="bar-chart" id="usageMainChart"></div>
      <div class="usage-legend" id="usageLegend"></div>
    </div>

    <div class="usage-2col">
      <div class="usage-card">
        <div class="usage-card-title">What consumed your coins</div>
        <div class="hbar-list" id="usageFeatChart"></div>
      </div>
      <div class="usage-card">
        <div class="usage-card-title">Time of day (when you use it)</div>
        <div class="bar-chart hours" id="usageHourChart"></div>
      </div>
    </div>
  </main>

  <div id="toast"></div>

  <script>
    let session = null;
    try { session = JSON.parse(localStorage.getItem('vnv_session') || 'null'); } catch (_) {}
    if (!session || !session.email) { window.location.href = 'login.html'; }
    const currentEmail = session ? session.email : null;

    function logout() { localStorage.removeItem('vnv_session'); window.location.href = 'login.html'; }

    async function loadCoins() {
      try {
        const res = await fetch('/api/coins', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'balance', email: currentEmail }) });
        const data = await res.json();
        document.getElementById('coinBalance').textContent = Math.floor(data.balance ?? 0).toLocaleString();
      } catch (_) {}
    }

    const USAGE_FEATURES = {
      video:  { label: 'Video (Realtime)',  color: '#7c3aed' },
      audio:  { label: 'Voice 1.0',         color: '#06b6d4' },
      both:   { label: 'Voice + Video 1.0', color: '#3b82f6' },
      audio2: { label: 'Voice 2.0',         color: '#10b981' },
      both2:  { label: 'Voice + Video 2.0', color: '#f59e0b' },
      record: { label: 'Voice Swap',        color: '#ec4899' },
      edit:   { label: 'Video Editor',      color: '#ef4444' },
    };
    const USAGE_MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    function ufeat(m){ return USAGE_FEATURES[m] || { label: m, color: '#9ca3af' }; }
    function upad(n){ return n < 10 ? '0' + n : '' + n; }

    let usageGran = 'daily', usageData = null;

    function setUsageGran(g, btn){
      usageGran = g;
      document.querySelectorAll('#usageGran .seg-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
      loadUsage();
    }

    async function loadUsage(){
      const days = usageGran === 'daily' ? 31 : usageGran === 'weekly' ? 84 : 120;
      let data;
      try {
        const res = await fetch('/api/coins', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'usage', email: currentEmail, days }) });
        data = await res.json();
      } catch (_) { data = null; }
      usageData = data && data.dayList ? data : { dayList: [], byDay: {}, byHour: {}, byFeature: {}, balance: null };
      renderUsage();
    }

    function usageBucket(dayList, byDay, gran){
      const out = [], idx = {};
      dayList.forEach(ds => {
        const [y,m,d] = ds.split('-').map(Number);
        const dt = new Date(Date.UTC(y, m-1, d));
        let key, label;
        if (gran === 'daily'){ key = ds; label = `${USAGE_MON[m-1]} ${d}`; }
        else if (gran === 'weekly'){
          const dow = (dt.getUTCDay() + 6) % 7;
          const mon = new Date(dt.getTime() - dow * 86400000);
          key = mon.toISOString().slice(0,10);
          label = `${USAGE_MON[mon.getUTCMonth()]} ${mon.getUTCDate()}`;
        } else { key = `${y}-${upad(m)}`; label = `${USAGE_MON[m-1]} '${String(y).slice(2)}`; }
        if (!(key in idx)){ idx[key] = out.length; out.push({ key, label, feats:{}, total:0 }); }
        const b = out[idx[key]], feats = byDay[ds] || {};
        for (const [mode,c] of Object.entries(feats)){ b.feats[mode] = (b.feats[mode]||0) + c; b.total += c; }
      });
      return out;
    }
    function renderStacked(el, periods){
      if (!periods.length || periods.every(p => p.total <= 0)){ el.innerHTML = '<div class="usage-empty">No usage yet — this fills in as you use VNV Pro.</div>'; return; }
      const max = Math.max(1, ...periods.map(p => p.total));
      el.innerHTML = periods.map(p => {
        const segs = Object.entries(p.feats).filter(([,c]) => c > 0)
          .map(([mode,c]) => `<div class="bar-seg" style="height:${(c/p.total*100)}%;background:${ufeat(mode).color};" title="${ufeat(mode).label}: ${Math.round(c).toLocaleString()}"></div>`).join('');
        return `<div class="bar-col" title="${p.label}: ${Math.round(p.total).toLocaleString()} coins"><div class="bar-stack" style="height:${(p.total/max*100)}%;">${segs}</div><div class="bar-lab">${p.label}</div></div>`;
      }).join('');
    }
    function renderFeatures(el, byFeature){
      const entries = Object.entries(byFeature || {}).filter(([,c]) => c > 0).sort((a,b) => b[1]-a[1]);
      if (!entries.length){ el.innerHTML = '<div class="usage-empty">No usage yet.</div>'; return; }
      const max = Math.max(...entries.map(e => e[1]));
      el.innerHTML = entries.map(([mode,c]) => `<div class="hbar-row"><div>${ufeat(mode).label}</div><div class="hbar-track"><div class="hbar-fill" style="width:${(c/max*100)}%;background:${ufeat(mode).color};"></div></div><div class="hbar-val">${Math.round(c).toLocaleString()}</div></div>`).join('');
    }
    function renderHours(el, byHour){
      const vals = []; for (let h = 0; h < 24; h++) vals.push((byHour && byHour[h]) || 0);
      if (vals.every(v => v <= 0)){ el.innerHTML = '<div class="usage-empty">No usage yet.</div>'; return; }
      const max = Math.max(1, ...vals);
      el.innerHTML = vals.map((v,h) => `<div class="bar-col" title="${h}:00 — ${Math.round(v).toLocaleString()} coins"><div class="bar-stack" style="height:${(v/max*100)}%;background:var(--accent);"></div><div class="bar-lab">${h % 3 === 0 ? h : ''}</div></div>`).join('');
    }
    function renderLegend(el, byFeature){
      el.innerHTML = Object.entries(byFeature || {}).filter(([,c]) => c > 0).map(([mode]) => `<span><i style="background:${ufeat(mode).color}"></i>${ufeat(mode).label}</span>`).join('');
    }
    function renderUsageSummary(el, dayList, byDay, balance){
      const sumRange = (n) => { let t = 0; (dayList || []).slice(-n).forEach(ds => { const f = byDay[ds] || {}; for (const c of Object.values(f)) t += c; }); return t; };
      let tiles = '';
      if (balance != null){
        tiles += `<div class="usage-tile"><div class="lab">Coins left</div><div class="val">${Math.floor(balance).toLocaleString()}</div><div class="sub">≈ ${Math.floor(balance/120)} min of video</div></div>`;
      }
      tiles += `<div class="usage-tile"><div class="lab">Used today</div><div class="val">${Math.round(sumRange(1)).toLocaleString()}</div></div>`;
      tiles += `<div class="usage-tile"><div class="lab">Last 7 days</div><div class="val">${Math.round(sumRange(7)).toLocaleString()}</div></div>`;
      tiles += `<div class="usage-tile"><div class="lab">Last 30 days</div><div class="val">${Math.round(sumRange(30)).toLocaleString()}</div></div>`;
      el.innerHTML = tiles;
    }
    function renderUsage(){
      const d = usageData; if (!d) return;
      document.getElementById('usageMainTitle').textContent = 'Coins used per ' + (usageGran === 'daily' ? 'day' : usageGran === 'weekly' ? 'week' : 'month');
      renderUsageSummary(document.getElementById('usageSummary'), d.dayList, d.byDay, d.balance);
      const keep = usageGran === 'daily' ? 30 : usageGran === 'weekly' ? 14 : 8;
      renderStacked(document.getElementById('usageMainChart'), usageBucket(d.dayList, d.byDay, usageGran).slice(-keep));
      renderLegend(document.getElementById('usageLegend'), d.byFeature);
      renderFeatures(document.getElementById('usageFeatChart'), d.byFeature);
      renderHours(document.getElementById('usageHourChart'), d.byHour);
    }

    if (currentEmail) { loadCoins(); loadUsage(); }
  </script>
</body>
</html>
