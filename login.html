<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — VNV Pro</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%237c3aed'/><text x='16' y='23' font-size='18' text-anchor='middle' fill='%23fff' font-family='Arial' font-weight='bold'>V</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--bg);
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: var(--shadow);
    }

    .login-card h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-card .subtitle {
      color: var(--text2);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 16px;
      display: none;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text2);
    }

    .login-footer a {
      color: var(--accent2);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .support-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--text2);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
      margin-top: 16px;
    }

    .support-link:hover {
      color: #25d366;
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-logo">
      <a href="index.html">
        <div class="logo-icon">✦</div>
        VNV Pro
      </a>
    </div>

    <div class="login-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your VNV Pro account</p>

      <div class="error-box" id="errorBox"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-full" id="loginBtn" style="margin-top: 8px;">
          Sign In
        </button>
      </form>

      <hr class="divider">

      <div class="login-footer">
        Don't have an account? <a href="signup.html">Sign Up here</a>
      </div>

      <a href="https://wa.me/18024402677?text=Hi, I need help with VNV Pro" target="_blank" class="support-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        Need help? Contact support
      </a>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // Check already logged in
    (function() {
      try {
        const s = JSON.parse(localStorage.getItem('vnv_session') || 'null');
        if (s && s.email) window.location.href = 'home.html';
      } catch(_) {}
    })();

    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const loginBtn = document.getElementById('loginBtn');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }

    function hideError() {
      errorBox.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const res = await fetch('/api/usercheck', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', email, password })
        });

        const data = await res.json();

        if (res.ok && data.ok) {
          localStorage.setItem('vnv_session', JSON.stringify({ email: data.email }));
          window.location.href = 'home.html';
        } else {
          showError(data.error || 'Invalid email or password.');
        }
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Sign In';
      }
    });

    // Toast utility
    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast');
      const el = document.createElement('div');
      el.className = `toast-item toast-${type}`;
      el.textContent = msg;
      toast.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
  </script>
</body>
</html>
